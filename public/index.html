<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HelpKart Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-wrapper {
      width: 420px;
      height: 680px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-info h2 {
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    .header-info p {
      color: rgba(255,255,255,0.85);
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Identity bar */
    .identify-bar {
      background: #fff8f0;
      border-bottom: 1px solid #ffe0c0;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }

    .identify-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }

    .identify-bar input:focus {
      border-color: #ff6b35;
    }

    .identify-bar button {
      padding: 8px 14px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .identify-bar button:hover {
      background: #e85d2b;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: #ff6b35;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #f1f3f4;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.streaming {
      background: #f1f3f4;
    }

    .message .sender {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: #f1f3f4;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      background: white;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #ff6b35;
    }

    .input-area button {
      width: 42px;
      height: 42px;
      background: #ff6b35;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .input-area button:hover { background: #e85d2b; }
    .input-area button:disabled { background: #ccc; cursor: not-allowed; }

    .input-area button svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* System messages */
    .system-msg {
      text-align: center;
      font-size: 12px;
      color: #999;
      padding: 4px 0;
    }

    .notification {
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
      color: #2e7d32;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="header">
    <div class="avatar">🛒</div>
    <div class="header-info">
      <h2>HelpKart Support</h2>
      <p><span class="status-dot"></span>Kart is online</p>
    </div>
  </div>

  <!-- Identify Bar -->
  <div class="identify-bar">
    <input type="email" id="emailInput" placeholder="Enter your email to load account..." />
    <button onclick="identifyCustomer()">Identify</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <input
      type="text"
      id="messageInput"
      placeholder="Type a message..."
      onkeydown="handleKeyDown(event)"
    />
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  let ws = null;
  let sessionId = null;
  let currentStreamDiv = null;
  let isStreaming = false;

  function connect() {
    ws = new WebSocket(`ws://localhost:3000`);

    ws.onopen = () => {
      console.log('Connected to HelpKart server');
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      handleMessage(data);
    };

    ws.onclose = () => {
      addSystemMessage('Connection lost. Reconnecting...');
      setTimeout(connect, 2000);
    };

    ws.onerror = (err) => {
      console.error('WebSocket error:', err);
    };

    // Keep-alive ping every 30 seconds
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ping' }));
      }
    }, 30000);
  }

  function handleMessage(data) {
    switch (data.type) {

      case 'session':
        sessionId = data.sessionId;
        addAssistantMessage(data.message);
        break;

      case 'identified':
        addNotification(data.message);
        break;

      case 'stream_start':
        isStreaming = true;
        removeTypingIndicator();
        currentStreamDiv = createStreamingMessage();
        break;

      case 'token':
        if (currentStreamDiv) {
          currentStreamDiv.querySelector('.content').textContent += data.content;
          scrollToBottom();
        }
        break;

      case 'stream_end':
        isStreaming = false;
        currentStreamDiv = null;
        enableInput();
        break;

      case 'error':
        removeTypingIndicator();
        addAssistantMessage(data.message);
        enableInput();
        break;

      case 'pong':
        // keep-alive acknowledged
        break;
    }
  }

  function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    // Show user message
    addUserMessage(text);
    input.value = '';

    // Show typing indicator
    addTypingIndicator();
    disableInput();

    // Send to server
    ws.send(JSON.stringify({
      type: 'chat',
      content: text,
      sessionId: sessionId,
    }));
  }

  function identifyCustomer() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email || !ws) return;

    ws.send(JSON.stringify({
      type: 'identify',
      email: email,
      sessionId: sessionId,
    }));

    document.getElementById('emailInput').value = '';
  }

  function handleKeyDown(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
  }

  // UI helpers
  function addUserMessage(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `<div class="sender">You</div><div class="content">${escapeHtml(text)}</div>`;
    messages.appendChild(div);
    scrollToBottom();
  }

  function addAssistantMessage(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = `<div class="sender">Kart</div><div class="content">${escapeHtml(text)}</div>`;
    messages.appendChild(div);
    scrollToBottom();
  }

  function createStreamingMessage() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant streaming';
    div.innerHTML = `<div class="sender">Kart</div><div class="content"></div>`;
    messages.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addTypingIndicator() {
    removeTypingIndicator();
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = `<span></span><span></span><span></span>`;
    messages.appendChild(div);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function addSystemMessage(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    messages.appendChild(div);
    scrollToBottom();
  }

  function addNotification(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'notification';
    div.textContent = text;
    messages.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
  }

  function disableInput() {
    document.getElementById('messageInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  }

  function enableInput() {
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('messageInput').focus();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  // Start connection
  connect();
</script>

</body>
</html>
